<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::Layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
</head>
<body>
<section>
    <div class="container-fluid p-5 mt-3">
        <!--        <div class="row">-->
        <!--            <div class="col-md-11">-->
        <div class="card card-sh">
            <div class="card-header text-center"><p class="fs-4">Products Details</p>
                <th:block th:if="${session.success}">
                    <p class="text-success fw-bold">[[${session.success}]]</p>
                    <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                </th:block>
                <th:block th:if="${session.error}">
                    <p class="text-danger fw-bold">[[${session.error}]]</p>
                    <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                </th:block>
            </div>
        </div>
        <div class="card-body">
            <table class="table">
                <thead>
                <tr>
                    <th scope="col">Id</th>
                    <th scope="col">Image</th>
                    <th scope="col">Name</th>
                    <th scope="col">Phone</th>
                    <th scope="col">Email</th>
                    <th scope="col">Address</th>
                    <th scope="col">City</th>
                    <th scope="col">State</th>
                    <th scope="col">Pincode</th>
                    <th scope="col">Status</th>
                    <th scope="col">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c:${users}">
                    <th scope="row">[[${c.id}]]</th>
                    <td><img th:src="@{'/img/profile_img/'+${c.image}}" alt=""
                             width="70px" height="70px"></td>
                    <td>[[${c.name}]]</td>
                    <td>[[${c.phone}]]</td>
                    <td>[[${c.email}]]</td>
                    <td>[[${c.address}]]</td>
                    <td>[[${c.city}]]</td>
                    <td>[[${c.state}]]</td>
                    <td>[[${c.pincode}]]</td>
                    <td>[[${c.isEnabled}]]</td>
                    <td>
                        <a th:href="@{'/shopping-cart/admin/updateUserStatus?status=true&id='+${c.id}}"
                           class="btn btn-light bg-black text-white btn-sm">Active</a>
                        <a th:href="@{'/shopping-cart/admin/updateUserStatus?status=false&id='+${c.id}}"
                           class="btn btn-danger btn-sm">Inactive</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <!--            </div>-->
        <!--        </div>-->
    </div>
</section>
</body>
</html>
